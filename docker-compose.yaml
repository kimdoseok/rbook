services:
  redisdb:
    image: "redis:latest"
    container_name: redis-service
    ports:
      - "6379:6379"
        
  postgresdb:
    image: postgres:alpine
    container_name: postgresdb 
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PGSQL_PASSWORD}
      POSTGRES_DB: ${DB_PGSQL_DBNAME}
      DB_PGSQL_HOST: ${DB_PGSQL_HOST}
      DB_PGSQL_USER: ${DB_PGSQL_USER}
      DB_PGSQL_PASSWORD: ${DB_PGSQL_PASSWORD}
      DB_PGSQL_DBNAME: ${DB_PGSQL_DBNAME}
      DB_PGSQL_PORT: ${DB_PGSQL_PORT}
      DB_USED: ${DB_USED}
    volumes: 
      - ./storage/postgres:/var/lib/postgresql
      # copy the sql script to create tables
      - ./postgres/entrypoint:/docker-entrypoint-initdb.d

  pgadmin:
    image: dpage/pgadmin4:latest # Use the official pgAdmin 4 image
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${DB_PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${DB_PGADMIN_PASSWORD}
    ports:
      - "8080:80" # Expose pgAdmin on port 8080 of the host
    depends_on:
      - postgresdb # Ensure PostgreSQL starts before pgAdmin
    volumes:
      - ./storage/pgadmin:/var/lib/pgadmin
